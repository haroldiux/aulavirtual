# ====================================================================
# Aula Virtual UNITEPC — docker-compose UNIFICADO (3 imagenes)
#   1. db    -> MySQL 8.0
#   2. back  -> Laravel 12 + PHP-FPM + Nginx (1 sola imagen, via supervisor)
#   3. front -> Vue 3 + Quasar 2 (Vite HMR en modo dev)
#
# Modo DESARROLLO (por defecto):
#   docker compose up -d --build
#     - Front: http://localhost:9000  (Vite HMR, codigo montado)
#     - Back:  http://localhost:8000  (Laravel, codigo montado)
#     - MySQL: localhost:3306
#
# Modo PRODUCCION (override):
#   docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d --build
#     - Front: http://localhost:8080  (nginx sirve el build + proxy /api)
#     - Back:  http://localhost:8000
#
# Comandos utiles:
#   docker compose logs -f front        # logs del front
#   docker compose exec back bash       # shell dentro del back
#   docker compose exec back php artisan migrate
# ====================================================================

name: aula-virtual

services:
  # ---------------- 1. BASE DE DATOS ----------------
  db:
    image: mysql:8.0
    container_name: aula_db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: secret
      MYSQL_DATABASE: aula_virtual
      MYSQL_USER: aula
      MYSQL_PASSWORD: aula_secret
    ports:
      - "3307:3306"
    volumes:
      - aula_db:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-psecret"]
      interval: 5s
      timeout: 5s
      retries: 20
    networks:
      - aula_net

  # ---------------- 2. BACKEND (Laravel) ----------------
  back:
    build:
      context: ./back
      dockerfile: Dockerfile
    container_name: aula_back
    restart: unless-stopped
    working_dir: /var/www
    depends_on:
      db:
        condition: service_healthy
      minio:
        condition: service_started
      redis:
        condition: service_started
    ports:
      - "8000:80"
    volumes:
      - ./back:/var/www           # codigo montado: cambios PHP al instante (dev)
      - /var/www/vendor           # vendor del contenedor (no del host)
    environment:
      DB_HOST: db
      DB_DATABASE: aula_virtual
      DB_USERNAME: aula
      DB_PASSWORD: aula_secret
      RUN_SEED: "true"            # en dev, ejecuta seeders al arrancar
      FILESYSTEM_DISK: s3
      AWS_ENDPOINT: http://minio:9000
      AWS_PUBLIC_URL: http://localhost:9090
      REDIS_HOST: redis
    networks:
      - aula_net

  # ---------------- 2b. MINIO (S3 para archivos) ----------------
  minio:
    image: minio/minio:latest
    container_name: aula_minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    ports:
      - "9090:9000"   # S3 API (host 9090)
      - "9091:9001"   # Consola web
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    volumes:
      - aula_minio:/data
    networks:
      - aula_net

  # ---------------- 2c. REDIS (Cache y Colas) ----------------
  redis:
    image: redis:7-alpine
    container_name: aula_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - aula_redis:/data
    networks:
      - aula_net

  # ---------------- 3. FRONTEND (Quasar/Vite) ----------------
  front:
    build:
      context: ./Aula-virtual
      dockerfile: Dockerfile
      target: dev
    container_name: aula_front
    restart: unless-stopped
    working_dir: /app
    depends_on:
      - back
    ports:
      - "9000:9000"
    volumes:
      - ./Aula-virtual:/app       # HMR: cambios del front al instante
      - /app/node_modules         # node_modules del contenedor (no del host)
    environment:
      - CHOKIDAR_USEPOLLING=true  # HMR confiable en Windows
      - VITE_API_BASE_URL=http://localhost:8000/api
    networks:
      - aula_net

volumes:
  aula_db:
  aula_minio:
  aula_redis:

networks:
  aula_net:
    driver: bridge
