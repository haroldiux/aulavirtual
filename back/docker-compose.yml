name: aula-virtual-lms

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: aula_app
    working_dir: /var/www
    volumes:
      - ./:/var/www
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_started
    networks:
      - lms_net
    restart: unless-stopped

  nginx:
    image: nginx:1.27-alpine
    container_name: aula_nginx
    ports:
      - "8000:80"
    volumes:
      - ./:/var/www
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - app
    networks:
      - lms_net
    restart: unless-stopped

  mysql:
    image: mysql:8.0
    container_name: aula_mysql
    ports:
      - "33066:3306"
    environment:
      MYSQL_ROOT_PASSWORD: secret
      MYSQL_DATABASE: aula_virtual
      MYSQL_USER: aula
      MYSQL_PASSWORD: aula_secret
    volumes:
      - aula_mysql:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-psecret"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - lms_net
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: aula_redis
    ports:
      - "6379:6379"
    volumes:
      - aula_redis:/data
    networks:
      - lms_net
    restart: unless-stopped

  minio:
    image: minio/minio:latest
    container_name: aula_minio
    command: server /data --console-address ":9001"
    ports:
      - "9090:9000"   # S3 API (host 9090 para no chocar con el frontend Vite en 9000)
      - "9091:9001"   # Consola web
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    volumes:
      - aula_minio:/data
    networks:
      - lms_net
    restart: unless-stopped

volumes:
  aula_mysql:
  aula_redis:
  aula_minio:

networks:
  lms_net:
    driver: bridge