upload_max_filesize = 64M
post_max_size = 64M
memory_limit = 256M
max_execution_time = 60

; Produccion: opcache
opcache.enable = 1
opcache.memory_consumption = 128
opcache.max_accelerated_files = 10000
; Dev: validate_timestamps=1 (refleja cambios PHP al instante). Prod: poner a 0.
opcache.validate_timestamps = 1