# ====================================================================
# Override de PRODUCCION — usar encima del compose base:
#   docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d --build
#
# Cambios respecto al dev:
#   - back:  APP_ENV=production, APP_DEBUG=false, sin seed, sin volumen de codigo
#   - front: target=prod (build + nginx), puerto 8080, sin volumen, proxy /api
# ====================================================================

services:
  back:
    environment:
      APP_ENV: production
      APP_DEBUG: "false"
      RUN_SEED: "false"
    volumes: !reset []

  front:
    build:
      target: prod
    ports: !override
      - "8080:80"
    volumes: !reset []
    command: !reset null
